<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
     <h1>Rock Paper Scissor</h1>
      <div id="game">
         <div id="rock">
               <img src="/images/rock.png" height="200px">
         </div>
         <div id="paper">
             <img src="/images/paper.png" height="200px">
         </div>
         <div id="scissor">
             <img src="/images/scissor.png" height="200px">
         </div>
     </div>
      <div id="score">
         <div id="myscore">0</div>
         <div id="compscore">0</div>
     </div>
     <div id="info">
         <div id="myinfo">You</div>
         <div id="compinfo">Comp</div>
     </div>

     <div id="btn">
               <button id="start"> Pick your move</button>
     </div>

    <script src="app.js"></script>
</body>
</html>
