<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElevenLabs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h2>||Elevenlabs</h1>
    </header>
    <main>
        <div id="heading"> 
         <h3>Create an Account</h3>
        </div>
        <div id="signup">
            <div class="btn">
                  <button id="google">
                <img src="google.png" height="12px">
                <span> Sign in with google</span>
                  </button>
            </div>
            <div>
                <div class="label1">
                <label for="mail">Email</label>
                </div>
                <div class="form">
                <!-- <label for="mail">Email</label> -->
                 <input type="text" id="mail" placeholder="Enter your Email">
                </div>
                <div class="label">
                 <label for="pass">  Password</label>
                 </div>
                 <div class="form">
                 <input type="password" id="pass" placeholder="Enter your password">
                </div>
            </div>
            <div id="loginbtn">
                <input type="button" value="Sign up" id="btn">
            </div>
            <div id="loginlbl">
                <label for="btn">Already registered?? Sign in</label>
            </div>
        </div>
    </main>
    <footer>
                <span>By continuing ,you agree to our terms and services and privacy policy</span>
    </footer>
</body>
